name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install chromium for browser tests
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      # playground 经 nuxt.config 加载 @lionad/leader-line-nuxt 模块,dist 均为 gitignore 产物,
      # typecheck/smoke 前必须按依赖序构建(workspace 拓扑:主库 → vue → nuxt);
      # 跳过根 prebuild 测试钩子——质量门禁由下方 Test 步骤独立承担,避免全量测试双跑
      - name: Build workspace packages
        run: npm_config_enable_pre_post_scripts=false pnpm --filter "@lionad/leader-line-nuxt..." -r build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Dist smoke (IIFE script-tag loading)
        run: pnpm test:smoke
